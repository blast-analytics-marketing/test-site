<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Appointments - AEP Adobe Tags Test</title>

  <!-- ACDL: initialize + push page context + page_load together -->
  <script>
    window.adobeDataLayer = window.adobeDataLayer || [];
    window.adobeDataLayer.push({
      event: "page_load",
      page: {
        url: window.location.href,
        server: window.location.hostname,
        name: document.title,
        section: "APPOINTMENTS"
      },
      environment: {
        name: "dev" // dev | qa | prod
      }
    });
  </script>

  <!-- Adobe Tags (Launch) embed code -->
  <script src="https://assets.adobedtm.com/6fdc3941716b/aa5b881ffda3/launch-851b9b0a51a5-development.min.js"></script>
</head>

<body>
  <h1>Appointments</h1>
  <p>Test page for a single example ACDL event.</p>

  <div style="display:flex; flex-direction:column; gap:10px; max-width:520px;">
    <!-- Single test button to fire the example event -->
    <button id="btnAppointmentConfirmed">Fire: appointment_confirmed</button>

    <hr />
    <!-- Button to return to home page -->
    <button id="backHomeBtn">Back to Home</button>
  </div>

  <script>
    // Fire the example event on click (matches your example structure)
    document.getElementById("btnAppointmentConfirmed").addEventListener("click", function () {
      var payload = {
        event: "appointment_confirmed",
        eventInfo: {
          appointmentType: "<VALUE>",      // e.g., in_person | virtual | phone
          scheduleFlowType: "<VALUE>",     // e.g., find_a_doctor | referral | urgent_care
          provider: {
            name: "<VALUE>",
            specialty: "<VALUE>"
          }
        }
      };

      window.adobeDataLayer = window.adobeDataLayer || [];
      window.adobeDataLayer.push(payload);
      console.log("appointment_confirmed pushed:", payload);
    });

    // Simple navigation back to home page
    document.getElementById("backHomeBtn").addEventListener("click", function () {
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
